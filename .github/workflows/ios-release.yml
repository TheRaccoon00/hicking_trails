name: iOS Release Build

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: stable
          cache: true

      - name: Create .env file
        run: |
          echo "API_ENDPOINT=${{ secrets.API_ENDPOINT }}" >> .env
          echo "OFFLINE_DATA_URL=${{ secrets.OFFLINE_DATA_URL }}" >> .env
          echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> .env
          echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" >> .env
      - name: Install certificate
        run: |
          printf "%s" "${{ secrets.IOS_CERTIFICATE }}" | base64 -D > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "${{ secrets.CERT_PASSWORD }}" -T /usr/bin/codesign
          security set-keychain-settings -lut 21600 build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 -D > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: pod install --project-directory=ios

      - name: Build iOS
        run: flutter build ios --release
    
      - name: Install Fastlane
        run: sudo gem install fastlane

      - name: Create API key file
        run: |
          mkdir -p ios/fastlane
          cat > ios/fastlane/api_key.json <<EOF
          {
            "key_id": "${{ secrets.APP_STORE_KEY_ID }}",
            "issuer_id": "${{ secrets.APP_STORE_ISSUER_ID }}",
            "key": "${{ secrets.APP_STORE_PRIVATE_KEY }}"
          }
          EOF

      - name: Upload to TestFlight
        run: |
          cd ios
          fastlane pilot upload \
            --ipa ../build/ios/ipa/*.ipa \
            --api_key_path fastlane/api_key.json
      
      - name: Build IPA
        run: flutter build ipa

      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/app.ipa